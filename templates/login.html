<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#F2B5C4">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}">
    <title>Japan 2026 - Login</title>
</head>
<body>
    <main class="container login-page">
        <div class="login-card">
            <!-- Torii Gate -->
            <div class="login-art" aria-hidden="true">
                <svg viewBox="0 0 120 100" width="120" height="100" fill="none" stroke-width="2.5" stroke-linecap="round">
                    <line x1="25" y1="30" x2="95" y2="30" stroke="#D4276A"/>
                    <line x1="20" y1="36" x2="100" y2="36" stroke="#D4276A"/>
                    <path d="M15 30 Q60 18 105 30" stroke="#D4276A" stroke-width="3" fill="none"/>
                    <line x1="30" y1="36" x2="30" y2="90" stroke="#D4276A"/>
                    <line x1="90" y1="36" x2="90" y2="90" stroke="#D4276A"/>
                    <line x1="30" y1="55" x2="90" y2="55" stroke="#D4276A" stroke-width="1.5"/>
                    <line x1="25" y1="90" x2="35" y2="90" stroke="#D4276A" stroke-width="2"/>
                    <line x1="85" y1="90" x2="95" y2="90" stroke="#D4276A" stroke-width="2"/>
                    <!-- Falling petals -->
                    <circle cx="50" cy="45" r="2" fill="#F2B5C4" opacity="0.7">
                        <animate attributeName="cy" values="45;85" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="cx" values="50;56" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.7;0" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="70" cy="50" r="1.5" fill="#F2B5C4" opacity="0.5">
                        <animate attributeName="cy" values="50;88" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="cx" values="70;64" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.5;0" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="60" cy="42" r="1.8" fill="#E8899E" opacity="0.6">
                        <animate attributeName="cy" values="42;82" dur="3.5s" repeatCount="indefinite" begin="1s"/>
                        <animate attributeName="cx" values="60;54" dur="3.5s" repeatCount="indefinite" begin="1s"/>
                        <animate attributeName="opacity" values="0.6;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
                    </circle>
                </svg>
            </div>
            <h1 class="login-title">Japan 2026</h1>
            <p class="login-subtitle">Cherry Blossom Trip</p>
            <form method="post" action="{{ url_for('login') }}" aria-label="Login form">
                {% if error %}
                <p class="login-error" role="alert">{{ error }}</p>
                {% endif %}
                <label for="password" class="sr-only">Trip password</label>
                <input type="password" name="password" id="password" placeholder="Trip password"
                       autofocus required autocomplete="current-password">
                <button type="submit">Enter</button>
            </form>
        </div>
    </main>
</body>
</html>
