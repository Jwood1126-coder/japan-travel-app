<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#FFB7C5">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <title>Japan 2026 - Login</title>
</head>
<body>
    <main class="container login-page">
        <div class="login-card">
            <h1 class="login-title">Japan 2026</h1>
            <p class="login-subtitle">Cherry Blossom Trip</p>
            <p class="login-emoji">&#x1f338;</p>
            <form method="post" action="{{ url_for('login') }}">
                {% if error %}
                <p class="login-error">{{ error }}</p>
                {% endif %}
                <input type="password" name="password" placeholder="Trip password"
                       autofocus required autocomplete="current-password">
                <button type="submit">Enter</button>
            </form>
        </div>
    </main>
</body>
</html>
