{% extends "base.html" %}
{% block title %}Trip Map - Japan 2026{% endblock %}

{% block content %}
<header>
{% from "icons.html" import icon_map, icon_train, icon_hotel %}
    <h1>{{ icon_map(22) }} Trip Map</h1>
    <div class="map-controls" id="dayFilters">
        <button class="map-ctrl-btn active" data-filter="all">All</button>
        <button class="map-ctrl-btn" data-filter="flights">Flights</button>
        {% for d in days_data %}
        <button class="map-ctrl-btn" data-filter="day-{{ d.day_number }}"
                title="{{ d.title }}">D{{ d.day_number }}</button>
        {% endfor %}
    </div>
    <div class="map-controls map-layer-toggles">
        <button class="map-toggle active" data-layer="transport">Routes</button>
        <button class="map-toggle active" data-layer="accom">Hotels</button>
    </div>
</header>
<div id="trip-map"></div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---- Data from backend ----
const cityMarkers = {{ city_markers | tojson }};
const daysData = {{ days_data | tojson }};
const accomMarkers = {{ accom_markers | tojson }};
const flightLegs = {{ flight_legs | tojson }};
const groundRoutes = {{ ground_routes | tojson }};

// ---- SVG icons for popups ----
const SVG_HOTEL = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V7l9-4 9 4v14"/><path d="M9 21v-4h6v4"/><path d="M3 11h18"/></svg>';
const SVG_PIN = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
const SVG_BOOK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>';

// ---- Day color palette (15 distinguishable colors) ----
const DAY_COLORS = [
    '#E91E7A', '#FF6B35', '#F7C548', '#88B04B', '#34A853',
    '#00ACC1', '#2196F3', '#5C6BC0', '#9C27B0', '#E91E63',
    '#FF8A65', '#AED581', '#4DD0E1', '#7986CB', '#CE93D8'
];

function dayColor(dayNum) { return DAY_COLORS[(dayNum - 1) % DAY_COLORS.length]; }

// ---- Map initialization ----
const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19, subdomains: 'abcd',
});
const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19, subdomains: 'abcd',
});

// Japan-only cities for default bounds
const japanCities = cityMarkers.filter(m => m.lat > 30 && m.lat < 45 && m.lng > 125);
const japanBounds = japanCities.map(m => [m.lat, m.lng]);

const map = L.map('trip-map', {
    zoomControl: true,
    preferCanvas: true,
}).fitBounds(japanBounds, { padding: [40, 40] });

(isDark ? darkTiles : lightTiles).addTo(map);

// ---- Helper: Google Maps search link ----
function gmapsLink(name, city) {
    const q = encodeURIComponent(name + (city ? ', ' + city : ', Japan'));
    return 'https://www.google.com/maps/search/?api=1&query=' + q;
}

// ---- Marker factories ----
function sakuraIcon() {
    return L.divIcon({
        className: 'map-marker-icon',
        html: '<div class="map-pin"></div>',
        iconSize: [20, 20], iconAnchor: [10, 10], popupAnchor: [0, -14],
    });
}

function dayIcon(dayNum) {
    const color = dayColor(dayNum);
    return L.divIcon({
        className: 'map-day-icon',
        html: '<div class="day-pin" style="background:' + color + '">' + dayNum + '</div>',
        iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16],
    });
}

function accomIcon(status) {
    const booked = (status === 'booked' || status === 'confirmed');
    const borderColor = booked ? '#34A853' : '#FF9800';
    return L.divIcon({
        className: 'map-accom-icon',
        html: '<div class="accom-pin" style="border-color:' + borderColor + '">' + SVG_HOTEL + '</div>',
        iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -17],
    });
}

function airportIconFactory() {
    return L.divIcon({
        className: 'airport-marker-icon',
        html: '<div class="airport-pin">&#9992;</div>',
        iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16],
    });
}

// ---- Build layer groups ----
const allCityLayer = L.layerGroup();
const transportLayer = L.layerGroup();
const accomLayer = L.layerGroup();
const flightLayer = L.layerGroup();
const dayLayers = {};  // day_number -> L.featureGroup

// ---- City markers (for "All" view) ----
const cityDaysMap = {};  // city name -> [{day_number, date}]
daysData.forEach(d => {
    if (!cityDaysMap[d.location_name]) cityDaysMap[d.location_name] = [];
    cityDaysMap[d.location_name].push({ day_number: d.day_number, date: d.date });
});

japanCities.forEach(m => {
    let html = '<div class="map-popup"><strong>' + m.name + '</strong>';
    if (m.vibe) html += '<div class="popup-vibe">' + m.vibe + '</div>';

    // Days at this city
    const cityDays = cityDaysMap[m.name] || [];
    if (cityDays.length) {
        html += '<div class="popup-days">';
        cityDays.forEach(cd => {
            html += '<a href="/day/' + cd.day_number + '" class="popup-day-chip" style="background:' +
                    dayColor(cd.day_number) + '">D' + cd.day_number + '</a> ';
        });
        html += '</div>';
    }

    if (m.guide_url) html += '<a href="' + m.guide_url + '" target="_blank" rel="noopener" class="popup-link">' + SVG_BOOK + ' Travel Guide</a>';
    html += '</div>';

    L.marker([m.lat, m.lng], { icon: sakuraIcon() })
        .bindPopup(html, { maxWidth: 260 })
        .addTo(allCityLayer);
});

// ---- Day-specific layers ----
daysData.forEach(d => {
    const group = L.featureGroup();

    // Day numbered pin at city
    const cityPopup = '<div class="map-popup"><strong>Day ' + d.day_number + ': ' + d.title + '</strong>' +
        '<div class="popup-dates">' + d.date + ' &mdash; ' + d.location_name + '</div>' +
        '<a href="/day/' + d.day_number + '" class="popup-link">View day details</a></div>';

    L.marker([d.lat, d.lng], { icon: dayIcon(d.day_number) })
        .bindPopup(cityPopup, { maxWidth: 260 })
        .addTo(group);

    // Activity list in a single popup at city center (offset slightly)
    if (d.activities.length) {
        let actHtml = '<div class="map-popup"><strong>Day ' + d.day_number + ' Activities</strong>';
        d.activities.forEach(a => {
            const cls = a.is_optional ? ' optional' : '';
            const done = a.is_completed ? ' done' : '';
            actHtml += '<div class="popup-activity' + cls + done + '">';
            if (a.time_slot) actHtml += '<span class="popup-time">' + a.time_slot + '</span> ';
            actHtml += '<span>' + a.title + '</span>';
            actHtml += ' <a href="' + gmapsLink(a.title, d.location_name) +
                       '" target="_blank" rel="noopener" class="popup-gmaps" title="Open in Google Maps">' + SVG_PIN + '</a>';
            actHtml += '</div>';
        });
        actHtml += '<a href="/day/' + d.day_number + '" class="popup-link">View full day</a></div>';

        L.marker([d.lat - 0.006, d.lng - 0.006], {
            icon: L.divIcon({
                className: 'map-act-icon',
                html: '<div class="act-pin" style="background:' + dayColor(d.day_number) + '">' +
                      d.activities.length + '</div>',
                iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -14],
            })
        }).bindPopup(actHtml, { maxWidth: 300 }).addTo(group);
    }

    dayLayers[d.day_number] = group;
});

// ---- Accommodation markers ----
accomMarkers.forEach(m => {
    let html = '<div class="map-popup"><strong>' + m.location_name + '</strong>';
    html += '<div class="popup-dates">' + m.check_in + ' &ndash; ' + m.check_out +
            ' (' + m.nights + 'N)</div>';
    if (m.selected_name) {
        html += '<div class="popup-accom">' + SVG_HOTEL + ' ' + m.selected_name + '</div>';
        const statusLabel = m.booking_status.replace(/_/g, ' ');
        html += '<span class="booking-badge ' + m.booking_status + '">' +
                statusLabel.charAt(0).toUpperCase() + statusLabel.slice(1) + '</span>';
    } else {
        html += '<div class="popup-accom">' + m.options_count + ' option' +
                (m.options_count !== 1 ? 's' : '') + ' &mdash; undecided</div>';
    }
    html += '<div class="popup-links"><a href="/accommodations" class="popup-link">View options</a>';
    if (m.selected_name) {
        html += ' &middot; <a href="' + gmapsLink(m.selected_name, m.location_name) +
                '" target="_blank" rel="noopener" class="popup-link">' + SVG_PIN + ' Map</a>';
    }
    html += '</div></div>';

    L.marker([m.lat, m.lng], { icon: accomIcon(m.booking_status) })
        .bindPopup(html, { maxWidth: 260 })
        .addTo(accomLayer);
});

// ---- Ground transport lines ----
groundRoutes.forEach(r => {
    let style;
    const baseColor = r.day_number ? dayColor(r.day_number) : '#E91E7A';
    if (r.type.indexOf('Shinkansen') >= 0) {
        style = { color: baseColor, weight: 3, dashArray: '10, 6', opacity: 0.8 };
    } else if (r.type.indexOf('Bus') >= 0) {
        style = { color: baseColor, weight: 2.5, dashArray: '4, 8', opacity: 0.75 };
    } else if (r.type.indexOf('Ferry') >= 0) {
        style = { color: '#2196F3', weight: 2, dashArray: '6, 4', opacity: 0.7 };
    } else {
        style = { color: baseColor, weight: 2, dashArray: '6, 4', opacity: 0.65 };
    }

    let popup = '<div class="map-popup"><strong>' + r.from_name + ' &rarr; ' + r.to_name + '</strong>';
    popup += '<div>' + r.type + (r.train_name ? ' (' + r.train_name + ')' : '') + '</div>';
    if (r.duration) popup += '<div>' + r.duration + '</div>';
    if (r.day_number) popup += '<div class="popup-day-badge" style="background:' +
                               dayColor(r.day_number) + '">Day ' + r.day_number + '</div>';
    if (r.jr_pass) popup += '<span class="jr-badge">JR Pass</span>';
    popup += '</div>';

    const line = L.polyline([[r.from_lat, r.from_lng], [r.to_lat, r.to_lng]], style)
        .bindPopup(popup);
    line._dayNumber = r.day_number;
    line.addTo(transportLayer);
});

// ---- Flight arcs ----
const airportsSeen = new Set();
flightLegs.forEach(leg => {
    [{code: leg.from_code, name: leg.from_name, lat: leg.from_lat, lng: leg.from_lng},
     {code: leg.to_code, name: leg.to_name, lat: leg.to_lat, lng: leg.to_lng}]
    .forEach(ap => {
        if (!airportsSeen.has(ap.code)) {
            airportsSeen.add(ap.code);
            L.marker([ap.lat, ap.lng], { icon: airportIconFactory() })
                .bindPopup('<div class="map-popup"><strong>' + ap.code + '</strong><div>' + ap.name + '</div></div>')
                .addTo(flightLayer);
        }
    });

    const arcPts = greatCircleArc(leg.from_lat, leg.from_lng, leg.to_lat, leg.to_lng, 60);
    let popup = '<div class="map-popup"><strong>' + leg.airline + ' ' + leg.flight_number + '</strong>';
    popup += '<div>' + leg.from_code + ' &rarr; ' + leg.to_code + '</div>';
    popup += '<div>' + leg.depart_date;
    if (leg.depart_time) popup += ' &middot; ' + leg.depart_time;
    if (leg.duration) popup += ' &middot; ' + leg.duration;
    popup += '</div>';
    const statusLabel = leg.booking_status.replace(/_/g, ' ');
    popup += '<span class="booking-badge ' + leg.booking_status + '">' +
             statusLabel.charAt(0).toUpperCase() + statusLabel.slice(1) + '</span>';
    popup += '</div>';

    L.polyline(arcPts, {
        color: '#2196F3', weight: 2.5, opacity: 0.7, dashArray: '8, 5',
    }).bindPopup(popup).addTo(flightLayer);
});

// ---- Initial state: show All view ----
allCityLayer.addTo(map);
transportLayer.addTo(map);
accomLayer.addTo(map);

// ---- Filter logic ----
let activeFilter = 'all';

function setFilter(filter) {
    activeFilter = filter;

    // Remove everything
    map.removeLayer(allCityLayer);
    map.removeLayer(flightLayer);
    map.removeLayer(accomLayer);
    Object.values(dayLayers).forEach(l => map.removeLayer(l));

    // Transport: show/hide based on both filter and toggle
    const transportVisible = document.querySelector('[data-layer="transport"]').classList.contains('active');
    if (transportVisible) {
        transportLayer.addTo(map);
    }
    const accomVisible = document.querySelector('[data-layer="accom"]').classList.contains('active');

    if (filter === 'all') {
        allCityLayer.addTo(map);
        if (accomVisible) accomLayer.addTo(map);
        // Show all transport lines
        transportLayer.eachLayer(l => { if (l.setStyle) l.setStyle({ opacity: l.options.opacity || 0.7 }); });
        map.fitBounds(japanBounds, { padding: [40, 40] });

    } else if (filter === 'flights') {
        allCityLayer.addTo(map);
        flightLayer.addTo(map);
        const allPts = [
            ...japanBounds,
            ...flightLegs.flatMap(l => [[l.from_lat, l.from_lng], [l.to_lat, l.to_lng]])
        ];
        map.fitBounds(allPts, { padding: [30, 30] });

    } else {
        // Day-specific filter
        const dayNum = parseInt(filter.replace('day-', ''));
        if (dayLayers[dayNum]) {
            dayLayers[dayNum].addTo(map);
        }

        // Show accommodation for this day's date range
        if (accomVisible) {
            accomLayer.addTo(map);
        }

        // Dim transport lines not for this day
        transportLayer.eachLayer(l => {
            if (l._dayNumber && l._dayNumber !== dayNum) {
                if (l.setStyle) l.setStyle({ opacity: 0.15 });
            } else if (l._dayNumber === dayNum) {
                if (l.setStyle) l.setStyle({ opacity: 0.9 });
            } else {
                if (l.setStyle) l.setStyle({ opacity: 0.2 });
            }
        });

        // Zoom to this day's bounds
        const dayData = daysData.find(d => d.day_number === dayNum);
        if (dayData) {
            // Include city + any matching transport endpoints
            const pts = [[dayData.lat, dayData.lng]];
            groundRoutes.forEach(r => {
                if (r.day_number === dayNum) {
                    pts.push([r.from_lat, r.from_lng]);
                    pts.push([r.to_lat, r.to_lng]);
                }
            });
            map.fitBounds(pts, { padding: [60, 60], maxZoom: 13 });
        }
    }

    // Update button states
    document.querySelectorAll('#dayFilters .map-ctrl-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
    });
}

// ---- Event listeners for day filter pills ----
document.querySelectorAll('#dayFilters .map-ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.filter));
});

// ---- Layer toggle buttons ----
document.querySelectorAll('.map-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        const layer = btn.dataset.layer;
        const isActive = btn.classList.contains('active');

        if (layer === 'transport') {
            isActive ? transportLayer.addTo(map) : map.removeLayer(transportLayer);
        } else if (layer === 'accom') {
            isActive ? accomLayer.addTo(map) : map.removeLayer(accomLayer);
        }
    });
});

// ---- Dark mode tile swap on theme toggle ----
const origToggleTheme = window.toggleTheme;
window.toggleTheme = function() {
    if (origToggleTheme) origToggleTheme();
    const nowDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (nowDark) {
        map.removeLayer(lightTiles);
        darkTiles.addTo(map);
    } else {
        map.removeLayer(darkTiles);
        lightTiles.addTo(map);
    }
};

// ---- Great-circle interpolation ----
function greatCircleArc(lat1, lng1, lat2, lng2, n) {
    const toR = d => d * Math.PI / 180;
    const toD = r => r * 180 / Math.PI;
    const p1 = toR(lat1), l1 = toR(lng1), p2 = toR(lat2), l2 = toR(lng2);
    const d = 2 * Math.asin(Math.sqrt(
        Math.sin((p1-p2)/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin((l1-l2)/2)**2
    ));
    if (d < 0.0001) return [[lat1, lng1], [lat2, lng2]];
    const pts = [];
    for (let i = 0; i <= n; i++) {
        const f = i / n;
        const A = Math.sin((1-f)*d) / Math.sin(d);
        const B = Math.sin(f*d) / Math.sin(d);
        const x = A*Math.cos(p1)*Math.cos(l1) + B*Math.cos(p2)*Math.cos(l2);
        const y = A*Math.cos(p1)*Math.sin(l1) + B*Math.cos(p2)*Math.sin(l2);
        const z = A*Math.sin(p1) + B*Math.sin(p2);
        pts.push([toD(Math.atan2(z, Math.sqrt(x*x+y*y))), toD(Math.atan2(y, x))]);
    }
    return pts;
}
</script>
{% endblock %}
